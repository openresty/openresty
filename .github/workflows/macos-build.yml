name: macOS build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: macOS x86_64
    runs-on: macos-15-intel

    env:
      JOBS: 3
      PCRE_VER: "10.47"
      PCRE_PREFIX: /opt/pcre2
      PCRE_LIB: /opt/pcre2/lib
      PCRE_INC: /opt/pcre2/include
      OPENSSL_VER: "3.5.6"
      OPENSSL_PATCH_VER: "3.5.5"
      OPENSSL_PREFIX: /opt/ssl3
      OPENSSL_LIB: /opt/ssl3/lib
      OPENSSL_INC: /opt/ssl3/include
      OPENRESTY_PREFIX: /opt/openresty

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Prepare cache directory
        run: mkdir -p download-cache

      - name: Cache downloaded tarballs
        uses: actions/cache@v4
        with:
          path: download-cache
          key: macos-build-${{ env.PCRE_VER }}-${{ env.OPENSSL_VER }}-${{ hashFiles('util/mirror-tarballs') }}
          restore-keys: |
            macos-build-${{ env.PCRE_VER }}-${{ env.OPENSSL_VER }}-
            macos-build-

      - name: Install dependencies
        run: |
          brew update
          brew install dos2unix gd libpq mercurial wget
          echo "$(brew --prefix libpq)/bin" >> "$GITHUB_PATH"

      - name: Build PCRE2
        run: |
          if [ ! -f "download-cache/pcre2-$PCRE_VER.tar.gz" ]; then
            wget -P download-cache "https://github.com/PCRE2Project/pcre2/releases/download/pcre2-${PCRE_VER}/pcre2-${PCRE_VER}.tar.gz"
          fi

          rm -rf "pcre2-$PCRE_VER"
          tar zxf "download-cache/pcre2-$PCRE_VER.tar.gz"
          cd "pcre2-$PCRE_VER"
          ./configure --prefix="$PCRE_PREFIX" --enable-jit --enable-utf --enable-unicode-properties
          make "-j$JOBS"
          sudo env PATH="$PATH" make install

      - name: Build OpenSSL
        run: |
          if [ ! -f "download-cache/openssl-$OPENSSL_VER.tar.gz" ]; then
            wget -P download-cache "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VER}/openssl-${OPENSSL_VER}.tar.gz"
          fi

          rm -rf "openssl-$OPENSSL_VER"
          tar zxf "download-cache/openssl-$OPENSSL_VER.tar.gz"
          cd "openssl-$OPENSSL_VER"
          patch -p1 < "../patches/openssl-$OPENSSL_PATCH_VER-sess_set_get_cb_yield.patch"
          ./config no-threads shared enable-ssl3 enable-ssl3-method -g --libdir=lib --prefix="$OPENSSL_PREFIX" -DPURIFY
          make "-j$JOBS"
          sudo make PATH="$PATH" install_sw

      - name: Build OpenResty
        run: |
          util/mirror-tarballs
          cd "openresty-$(./util/ver)"
          ./configure \
            --with-http_v3_module \
            --with-stream_realip_module \
            --with-http_realip_module \
            --prefix="$OPENRESTY_PREFIX" \
            --with-cc-opt="-I$PCRE_INC -I$OPENSSL_INC" \
            --with-ld-opt="-L$PCRE_LIB -L$OPENSSL_LIB" \
            --with-pcre-jit \
            --with-http_ssl_module \
            --with-debug \
            "-j$JOBS"
          make "-j$JOBS"
          sudo make install
          cd ..

          export PATH="$OPENRESTY_PREFIX/bin:$OPENRESTY_PREFIX/nginx/sbin:$PATH"
          test -x "$OPENRESTY_PREFIX/nginx/sbin/nginx"
          test -x "$OPENRESTY_PREFIX/bin/resty"
          nginx -V
          otool -L "$(command -v nginx)"
          resty -e 'print("resty ok")'

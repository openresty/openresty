name: Linux build and test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      include_ibm_power_z:
        description: Run IBM Power/Z jobs. Requires IBM actionspz onboarding.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  JOBS: 3
  PCRE_VER: "10.47"
  PCRE_PREFIX: /opt/pcre2
  PCRE_LIB: /opt/pcre2/lib
  PCRE_INC: /opt/pcre2/include
  OPENSSL_VER: "3.5.6"
  OPENSSL_PATCH_VER: "3.5.5"
  OPENSSL_PREFIX: /opt/ssl3
  OPENSSL_LIB: /opt/ssl3/lib
  OPENSSL_INC: /opt/ssl3/include
  OPENRESTY_PREFIX: /opt/openresty

jobs:
  build:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Cache downloaded tarballs
        uses: actions/cache@v4
        with:
          path: download-cache
          key: linux-build-${{ matrix.arch }}-${{ env.PCRE_VER }}-${{ env.OPENSSL_VER }}-${{ hashFiles('util/mirror-tarballs') }}
          restore-keys: |
            linux-build-${{ matrix.arch }}-${{ env.PCRE_VER }}-${{ env.OPENSSL_VER }}-
            linux-build-${{ matrix.arch }}-

      - name: Enable IPv6
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=0
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=0

      - name: Build and test
        run: bash .github/scripts/linux-build-test.sh

  ibm-power-z-build:
    name: Linux ${{ matrix.arch }}
    if: ${{ vars.ENABLE_IBM_POWER_Z_RUNNERS == 'true' || (github.event_name == 'workflow_dispatch' && inputs.include_ibm_power_z) }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: s390x
            runner: ubuntu-22.04-s390x
          - arch: ppc64le
            runner: ubuntu-22.04-ppc64le

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Cache downloaded tarballs
        uses: actions/cache@v4
        with:
          path: download-cache
          key: linux-build-${{ matrix.arch }}-${{ env.PCRE_VER }}-${{ env.OPENSSL_VER }}-${{ hashFiles('util/mirror-tarballs') }}
          restore-keys: |
            linux-build-${{ matrix.arch }}-${{ env.PCRE_VER }}-${{ env.OPENSSL_VER }}-
            linux-build-${{ matrix.arch }}-

      - name: Enable IPv6
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=0
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=0

      - name: Build and test
        run: bash .github/scripts/linux-build-test.sh
